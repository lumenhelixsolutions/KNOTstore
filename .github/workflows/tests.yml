name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest (the library itself is stdlib-only)
        run: python -m pip install --upgrade pip pytest
      - name: Run engine + application + bench test suites
        run: python -m pytest knotstore/test_knotstore.py test_knotcore.py apps bench -v
      - name: Packaging smoke test (each console script imports + responds to --help)
        run: |
          set -e
          for app in knotvault prefixforge driftledger checkpointtime knot; do
            echo "::group::$app --help"
            PYTHONPATH="apps/$app:$PWD" python -m "$app" --help > /dev/null
            echo "ok: $app"
            echo "::endgroup::"
          done
